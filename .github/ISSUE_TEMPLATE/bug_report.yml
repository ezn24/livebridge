name: Bug report
description: Report crashes, false positives, wrong parsing, or UI regressions
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please fill the fields below. For conversion, parser, or OTP issues,
        attach a notification sample or paste the payload JSON copied from
        LiveBridge conversion log if you have it.

        Issues or questions about Android installer errors like "There is a
        problem when parsing the software package" / "There was a problem
        parsing the package" are not accepted and may be closed automatically.
        Before installing the APK, use Android 16+ and disable Play Protect for
        the installation.

  - type: textarea
    id: summary
    attributes:
      label: Quick summary
      description: Describe the issue in 1-2 sentences.
      placeholder: Short summary of the bug.
    validations:
      required: true

  - type: textarea
    id: diagnostics_json
    attributes:
      label: Diagnostics JSON
      description: In LiveBridge, open Settings -> Report a bug -> Copy debug JSON. Paste it here. Remove personal data if needed.
      render: json
      placeholder: |
        {
          "schema": "livebridge_bug_report_v1"
        }
    validations:
      required: true

  - type: dropdown
    id: bug_type
    attributes:
      label: Type of bug
      options:
        - Crash
        - False positive conversion (should NOT become Live Update)
        - False negative conversion (should become Live Update, but does not)
        - Wrong stage/progress/status
        - OTP/code detection issue
        - App selection / package rules issue
        - Conversion log issue
        - UI/UX issue
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      placeholder: What actually happens?
    validations:
      required: true

  - type: textarea
    id: notification_sample
    attributes:
      label: Notification sample / conversion log JSON (optional)
      description: For parser, conversion, or OTP bugs, paste anonymized notification content. You can also paste payload JSON copied from Home -> Recent conversions -> tap the app -> copy Payload JSON.
      render: text
      placeholder: |
        Option A - payload JSON from LiveBridge conversion log:
        {
          "package": "com.example.app",
          "title": "...",
          "text": "...",
          "payload": {
            "..."
          }
        }

        Option B - plain notification sample:
        App package: com.example.app
        App name:
        Notification title:
        Notification text:
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Media / screenshots (optional)
      description: Add screenshots or a short screen recording link.
      placeholder: Drag and drop files or paste links.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context (optional)
      placeholder: Any extra details that may help reproduce the issue.
    validations:
      required: false
